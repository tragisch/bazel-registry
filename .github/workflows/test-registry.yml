name: Build Registry Modules

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  determine-modules:
    name: Determine modules to test
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.select.outputs.matrix }}
      count: ${{ steps.select.outputs.count }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: select
        name: Select changed modules
        shell: bash
        run: |
          set -euo pipefail

          all_modules=$(cat <<'JSON'
          [
            {"name":"argon2","version":"20190702","target":"@argon2//:argon2","command":"build"},
            {"name":"argtable3","version":"3.2.2","target":"@argtable3//:argtable3","command":"build"},
            {"name":"box2d","version":"3.0.0","target":"@box2d//:box2d","command":"build"},
            {"name":"graphblas","version":"10.3.1","target":"@graphblas//:graphblas","command":"build"},
            {"name":"liblinear","version":"247","target":"@liblinear//:liblinear","command":"build"},
            {"name":"libsodium","version":"1.0.20","target":"@libsodium//:libsodium","command":"build"},
            {"name":"libzmq","version":"4.3.5","target":"@libzmq//:libzmq","command":"build"},
            {"name":"czmq","version":"4.2.1","target":"@czmq//:czmq","command":"build"},
            {"name":"openmp","version":"22.1.1","target":"@openmp//:omp_smoke_test","command":"test"},
            {"name":"raylib","version":"5.5","target":"@raylib//:raylib","command":"build"},
            {"name":"sha1","version":"e1e2536fcf6a8f9703be8c85d58724b408552287","target":"@sha1//:sha1","command":"build"},
            {"name":"throw_the_switch","version":"2.5.2","target":"@throw_the_switch//:Unity","command":"build"},
            {"name":"uthash","version":"2.3.0","target":"@uthash//:uthash","command":"build"}
          ]
          JSON
          )

          known_module_names=$(jq -r '.[].name' <<<"$all_modules")

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
          else
            base_sha="${{ github.event.before }}"
          fi
          head_sha="${{ github.sha }}"

          if [[ -n "$base_sha" && "$base_sha" != "0000000000000000000000000000000000000000" ]]; then
            mapfile -t changed_files < <(git diff --name-only "$base_sha" "$head_sha")
          else
            mapfile -t changed_files < <(git ls-files)
          fi

          declare -A changed_modules=()
          run_all=false

          for path in "${changed_files[@]}"; do
            [[ -z "$path" ]] && continue

            if [[ "$path" =~ ^modules/([^/]+)/ ]]; then
              changed_modules["${BASH_REMATCH[1]}"]=1
              continue
            fi

            case "$path" in
              README.md)
                ;;
              .github/workflows/test-registry.yml|bazel_registry.json|test/*|.github/actions/*|.github/workflows/*)
                run_all=true
                ;;
              *)
                run_all=true
                ;;
            esac
          done

          if [[ "${#changed_files[@]}" -eq 0 ]]; then
            run_all=true
          fi

          if [[ "$run_all" == true ]]; then
            selected_modules="$all_modules"
          elif [[ "${#changed_modules[@]}" -eq 0 ]]; then
            selected_modules='[]'
          else
            unknown_modules=()
            for module_name in "${!changed_modules[@]}"; do
              if ! grep -Fxq "$module_name" <<<"$known_module_names"; then
                if [[ -f "modules/$module_name/metadata.json" ]]; then
                  unknown_modules+=("$module_name")
                fi
              fi
            done

            if [[ "${#unknown_modules[@]}" -ne 0 ]]; then
              printf 'Published modules changed but missing from workflow matrix: %s\n' "${unknown_modules[*]}" >&2
              exit 1
            fi

            changed_module_names=$(printf '%s\n' "${!changed_modules[@]}" | sort | jq -R . | jq -s .)
            selected_modules=$(jq --argjson names "$changed_module_names" '[.[] | select(.name as $name | $names | index($name))]' <<<"$all_modules")
          fi

          count=$(jq 'length' <<<"$selected_modules")

          echo "Changed files detected:"
          if [[ "${#changed_files[@]}" -eq 0 ]]; then
            echo "  (none)"
          else
            printf '  - %s\n' "${changed_files[@]}"
          fi

          if [[ "$run_all" == true ]]; then
            echo "Selection mode: full matrix"
          elif [[ "$selected_modules" == '[]' ]]; then
            echo "Selection mode: no published module changes"
          else
            echo "Selection mode: changed modules only"
          fi

          echo "Selected modules:"
          if [[ "$selected_modules" == '[]' ]]; then
            echo "  (none)"
          else
            jq -r '.[] | "  - \(.name)@\(.version) [\(.command) \(.target)]"' <<<"$selected_modules"
          fi

          {
            echo "### Registry module selection"
            echo
            if [[ "$run_all" == true ]]; then
              echo "- Mode: full matrix"
            elif [[ "$selected_modules" == '[]' ]]; then
              echo "- Mode: no published module changes"
            else
              echo "- Mode: changed modules only"
            fi
            echo "- Changed files: ${#changed_files[@]}"
            echo "- Selected modules: $count"
            if [[ "$selected_modules" != '[]' ]]; then
              echo
              jq -r '.[] | "- `\(.name)@\(.version)` → `\(.command) \(.target)`"' <<<"$selected_modules"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          matrix=$(jq -cn \
            --argjson modules "$selected_modules" \
            '{os: ["ubuntu-latest", "macos-latest"], module: $modules}')

          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "count=$count" >> "$GITHUB_OUTPUT"

  build-module:
    needs: determine-modules
    if: needs.determine-modules.outputs.count != '0'
    name: ${{ matrix.module.name }} (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.determine-modules.outputs.matrix) }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Bazelisk
        shell: bash
        run: |
          set -euo pipefail
          version="v1.27.0"
          os_name=$(uname -s)
          arch_name=$(uname -m)

          case "$os_name" in
            Linux) platform="linux" ;;
            Darwin) platform="darwin" ;;
            *) echo "Unsupported OS: $os_name" >&2; exit 1 ;;
          esac

          case "$arch_name" in
            x86_64|amd64) asset_arch="amd64" ;;
            arm64|aarch64) asset_arch="arm64" ;;
            *) echo "Unsupported architecture: $arch_name" >&2; exit 1 ;;
          esac

          asset="bazelisk-${platform}-${asset_arch}"
          url="https://github.com/bazelbuild/bazelisk/releases/download/${version}/${asset}"

          curl -L --fail "$url" -o bazelisk
          chmod +x bazelisk
          sudo mv bazelisk /usr/local/bin/bazelisk
          sudo ln -sf /usr/local/bin/bazelisk /usr/local/bin/bazel
          bazelisk version

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libx11-dev libxrandr-dev libxinerama-dev \
            libxcursor-dev libxi-dev libgl-dev \
            libblas-dev liblapack-dev

      - name: Create test workspace
        run: |
          mkdir -p /tmp/build-test
          printf 'module(name="build_test")\nbazel_dep(name="rules_cc",version="0.2.17")\nbazel_dep(name="bazel_skylib",version="1.8.2")\nbazel_dep(name="platforms",version="1.0.0")\nbazel_dep(name="%s",version="%s")\n' \
            "${{ matrix.module.name }}" "${{ matrix.module.version }}" \
            > /tmp/build-test/MODULE.bazel
          touch /tmp/build-test/BUILD.bazel

      - name: ${{ matrix.module.command == 'test' && 'Test' || 'Build' }} ${{ matrix.module.name }}@${{ matrix.module.version }}
        working-directory: /tmp/build-test
        run: |
          bazelisk ${{ matrix.module.command }} \
            --registry=file://${{ github.workspace }} \
            --registry=https://bcr.bazel.build \
            ${{ matrix.module.target }}
        timeout-minutes: 20

  no-module-changes:
    needs: determine-modules
    if: needs.determine-modules.outputs.count == '0'
    name: No registry module changes
    runs-on: ubuntu-latest

    steps:
      - name: Report skipped module builds
        run: echo "No registry module changes detected; skipping module build matrix."
